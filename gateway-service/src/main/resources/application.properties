spring.application.name=gateway-service
server.port=8080

# --- DESACTIVAR COMPONENTES NO USADOS ---
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

# --- SEGURIDAD JWT (Base64 Key) ---
application.security.jwt.secret-key=${JWT_SECRET_KEY:2UHjkWZU0VNZZeDuGsBZdmYWk8zBbSodnpk/WhB3zOY=}

# --- RUTEO (Format Spring Cloud 2025+) ---

# 1. User Service
spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://user-service:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/users/**, /api/v1/auth/**

# 2. Wallet Service
spring.cloud.gateway.server.webflux.routes[1].id=wallet-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://wallet-service:8083
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/wallets/**

# 3. Auction Service
spring.cloud.gateway.server.webflux.routes[2].id=auction-service
spring.cloud.gateway.server.webflux.routes[2].uri=http://auction-service:8084
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/auction/**, /api/v1/bids/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter.replenishRate=50
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter.burstCapacity=100
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.key-resolver=#{@userKeyResolver}

# 4. Advertisement Service (Campaigns)
spring.cloud.gateway.server.webflux.routes[3].id=advertisement-service
spring.cloud.gateway.server.webflux.routes[3].uri=http://advertisement-service:8082
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/campaigns/**

# 5. Device Service
spring.cloud.gateway.server.webflux.routes[4].id=device-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://device-service:8085
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/devices/**

# --- REDIS CONFIG & TIMEOUTS ---
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=500

# --- FORCE REACTIVE ---
spring.main.web-application-type=reactive

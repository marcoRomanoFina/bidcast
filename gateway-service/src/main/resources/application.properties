spring.application.name=gateway-service
server.port=8080

# --- DESACTIVAR COMPONENTES NO USADOS ---
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.service-registry.auto-registration.enabled=false

# --- SEGURIDAD JWT (Base64 Key) ---
application.security.jwt.secret-key=${JWT_SECRET_KEY}

# --- RUTEO (RBAC Estricto - Principio de Mínimo Privilegio) ---

# 1. User Service (Público)
spring.cloud.gateway.server.webflux.routes[0].id=user-auth-public
spring.cloud.gateway.server.webflux.routes[0].uri=http://user-service:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/v1/auth/login, /api/v1/users/register

# 2. User Service (Protegido)
spring.cloud.gateway.server.webflux.routes[1].id=user-service-protected
spring.cloud.gateway.server.webflux.routes[1].uri=http://user-service:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/v1/users/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=AuthenticationFilter

# 3. Wallet Service - Consulta de Saldo Propio (Solo Lectura para Usuarios)
spring.cloud.gateway.server.webflux.routes[2].id=wallet-service-me
spring.cloud.gateway.server.webflux.routes[2].uri=http://wallet-service:8083
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/v1/wallets/me
spring.cloud.gateway.server.webflux.routes[2].predicates[1]=Method=GET
spring.cloud.gateway.server.webflux.routes[2].filters[0]=AuthenticationFilter=ADVERTISER,PUBLISHER,ADMIN

# 4. Wallet Service - Operaciones Críticas / Ledger (Solo ADMIN o Interno)
spring.cloud.gateway.server.webflux.routes[3].id=wallet-service-internal
spring.cloud.gateway.server.webflux.routes[3].uri=http://wallet-service:8083
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/v1/wallets/**, /api/v1/proof-of-play-charges/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=AuthenticationFilter=ADMIN

# 5. Selection Service (Acceso para Publishers y Admin)
spring.cloud.gateway.server.webflux.routes[4].id=selection-service
spring.cloud.gateway.server.webflux.routes[4].uri=http://selection-service:8084
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/v1/selection/**, /api/v1/session-offers/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=AuthenticationFilter=PUBLISHER,ADMIN
spring.cloud.gateway.server.webflux.routes[4].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[4].filters[1].args.redis-rate-limiter.replenishRate=50
spring.cloud.gateway.server.webflux.routes[4].filters[1].args.redis-rate-limiter.burstCapacity=100
spring.cloud.gateway.server.webflux.routes[4].filters[1].args.key-resolver=#{@userKeyResolver}

# 6. Advertisement Service (Solo Advertisers)
spring.cloud.gateway.server.webflux.routes[5].id=advertisement-service
spring.cloud.gateway.server.webflux.routes[5].uri=http://advertisement-service:8082
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/campaigns/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=AuthenticationFilter=ADVERTISER,ADMIN

# 7. Billing Service (Solo Advertisers)
spring.cloud.gateway.server.webflux.routes[6].id=billing-service
spring.cloud.gateway.server.webflux.routes[6].uri=http://billing-service:8086
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/v1/billing/**
spring.cloud.gateway.server.webflux.routes[6].filters[0]=AuthenticationFilter=ADVERTISER,ADMIN

# --- REDIS CONFIG & TIMEOUTS ---
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.connect-timeout=2000
spring.data.redis.timeout=500

# --- FORCE REACTIVE ---
spring.main.web-application-type=reactive

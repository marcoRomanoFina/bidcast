name: Bidcast CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            advertisement:
              - 'advertisement-service/**'
            selection:
              - 'selection-service/**'
            billing:
              - 'billing-service/**'
            venue:
              - 'venue-service/**'
            gateway:
              - 'gateway-service/**'
            user:
              - 'user-service/**'
            wallet:
              - 'wallet-service/**'

  build-and-test:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' && needs.changes.outputs.services != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.changes.outputs.services) }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test with Maven
        env:
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SELECTION_RECEIPT_SECRET: ${{ secrets.SELECTION_RECEIPT_SECRET }}
          MP_ACCESS_TOKEN: 'TEST-ACCESS-TOKEN-FOR-CI'
          MP_WEBHOOK_SECRET: 'test_webhook_secret_for_ci'
        run: |
          cd ${{ matrix.service }}-service
          chmod +x mvnw
          ./mvnw test
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          cd ${{ matrix.service }}-service
          docker build -t bidcast/${{ matrix.service }}-service .

      - name: Simulated Deploy
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "Desplegando ${{ matrix.service }}-service (Simulado)..."

image: maven:3.9.6-eclipse-temurin-21

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

stages:
  - build
  - test
  - deploy


device_build:
  stage: build
  script:
    - echo "🏗️ Compilando Device Service..."
    - cd device-service
    - mvn clean package -DskipTests
  rules:
    - changes:
        - device-service/**/*

device_test:
  stage: test
  needs: ["device_build"]
  services:
    - name: postgres:15-alpine
      alias: postgres
  variables:
    POSTGRES_PASSWORD: postgres
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devices_db
  script:
    - echo "🧪 Corriendo tests Device..."
    - cd device-service
    - mvn test
  rules:
    - changes:
        - device-service/**/*

device_deploy:
  stage: deploy
  needs: ["device_test"]
  script:
    - echo "🚀 Desplegando Device Service (Simulado)..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - device-service/**/*


user_build:
  stage: build
  script:
    - echo "🏗️ Compilando User Service..."
    - cd user-service
    - mvn clean package -DskipTests
  rules:
    - changes:
        - user-service/**/*

user_test:
  stage: test
  needs: ["user_build"]
  services:
    - name: docker:24.0.5-dind 
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375 
    DOCKER_TLS_CERTDIR: "" 
  script:
    - echo "🧪 Corriendo tests User con Testcontainers..."
    - cd user-service
    - mvn test
  rules:
    - changes:
        - user-service/**/*

user_deploy:
  stage: deploy
  needs: ["user_test"]
  script:
    - echo "🚀 Desplegando User Service (Simulado)..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - user-service/**/*
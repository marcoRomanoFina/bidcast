image: maven:3.9.9-eclipse-temurin-21

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

stages:
  - test
  - build
  - deploy

# ==========================================
# DEVICE SERVICE
# ==========================================
device_test:
  stage: test
  script:
    - cd device-service
    - mvn test
  rules:
    - changes:
        - device-service/**/*
        - .gitlab-ci.yml

device_build:
  stage: build
  needs: ["device_test"]
  image: docker:27
  # ELIMINAMOS EL BLOQUE 'services:' DE DIND
  script:
    - cd device-service
    - docker build -t bidcast/device-service .
  rules:
    - changes:
        - device-service/**/*
        - .gitlab-ci.yml

device_deploy:
  stage: deploy
  needs: ["device_build"]
  script:
    - echo "Desplegando Device Service (Simulado)..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - device-service/**/*
        - .gitlab-ci.yml


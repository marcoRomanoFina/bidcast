  stage: deploy
  needs: ["ad_build"]
  script:
    - echo "🚀 Desplegando Advertisement Service (Simulado)..."
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - advertisement-service/**/*
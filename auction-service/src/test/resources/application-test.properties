# Forzar la creación de tablas para Testcontainers
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Desactivar Bean overriding si es necesario
spring.main.allow-bean-definition-overriding=true

# Evitar que los jobs programados ensucien el log de test
logging.level.com.bidcast.auction_service.settlement.SessionReconciliationJob=ERROR
logging.level.com.bidcast.auction_service.core.outbox.OutboxRelay=ERROR

spring.redisson.password=
bidcast.auction.receipt-secret=test-receipt-secret-for-auction-tests

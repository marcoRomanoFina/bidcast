spring.datasource.url=jdbc:postgresql://localhost:5432/adcast
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

adcast.selection-service.url=${ADCAST_SELECTION_SERVICE_URL:http://localhost:8084}
adcast.session.presence.heartbeat-interval=${ADCAST_SESSION_HEARTBEAT_INTERVAL:15s}
adcast.session.presence.stale-after=${ADCAST_SESSION_STALE_AFTER:60s}
adcast.session.presence.close-empty-after=${ADCAST_SESSION_CLOSE_EMPTY_AFTER:5m}
adcast.session.presence.cleanup-interval=${ADCAST_SESSION_CLEANUP_INTERVAL:30s}

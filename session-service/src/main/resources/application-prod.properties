spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

spring.rabbitmq.host=${RABBITMQ_HOST}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

adcast.selection-service.url=${ADCAST_SELECTION_SERVICE_URL:http://selection-service:8084}
adcast.session.presence.heartbeat-interval=${ADCAST_SESSION_HEARTBEAT_INTERVAL:15s}
adcast.session.presence.stale-after=${ADCAST_SESSION_STALE_AFTER:60s}
adcast.session.presence.close-empty-after=${ADCAST_SESSION_CLOSE_EMPTY_AFTER:5m}
adcast.session.presence.cleanup-interval=${ADCAST_SESSION_CLEANUP_INTERVAL:30s}

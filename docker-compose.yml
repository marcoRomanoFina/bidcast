services:
  postgres:
    image: postgres:16-alpine
    container_name: bidcast-postgres
    environment:
      POSTGRES_DB: bidcast
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bidcast-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    container_name: bidcast-redis
    ports:
      - "6379:6379"
